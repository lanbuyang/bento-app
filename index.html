<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>便當點餐 · 科林研發</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#06C167;--gd:#049A52;--bg:#F5F5F5;--card:#fff;--text:#1A1A1A;--muted:#888;--r:16px}
body{font-family:-apple-system,"PingFang TC",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}
header{background:var(--g);color:white;padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;font-weight:800}
.chip{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:12px}
.tabs{display:flex;background:var(--card);border-bottom:2px solid #EEE}
.tab{flex:1;padding:12px;text-align:center;font-size:15px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--muted);transition:color .15s}
.tab.active{color:var(--g);border-bottom:3px solid var(--g);margin-bottom:-2px}
.sec{padding:12px 14px 0}
.lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.shop-card{background:var(--card);border-radius:var(--r);padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px}
.shop-icon{font-size:34px;flex-shrink:0}
.shop-info{flex:1;min-width:0}
.shop-info h2{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#F0F0F0;color:#444;font-weight:600;white-space:nowrap}
.badge.g{background:#E6F9F0;color:var(--gd)}.badge.o{background:#FFF3E0;color:#E65100}
.badge.p{background:#FFF0F0;color:#C62828}.badge.v{background:#F3E5F5;color:#7B1FA2}
#rbtn{background:var(--g);color:white;border:none;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mi{background:var(--card);border-radius:var(--r);padding:12px;box-shadow:0 2px 6px rgba(0,0,0,.07);display:flex;flex-direction:column;gap:4px;border:2.5px solid transparent;cursor:pointer;transition:border-color .15s,transform .1s;user-select:none}
.mi:active{transform:scale(.97)}.mi.sel{border-color:var(--g);background:#F0FCF5}
.iname{font-size:14px;font-weight:700;line-height:1.3}
.iprice{font-size:13px;color:var(--gd);font-weight:600}
.qrow{display:flex;align-items:center;gap:5px;margin-top:3px}
.qbtn{width:26px;height:26px;border-radius:50%;border:2px solid var(--g);background:white;color:var(--g);font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qbtn:active{background:var(--g);color:white}
.qnum{font-size:15px;font-weight:800;min-width:18px;text-align:center}
.qrow2{display:flex;gap:8px}
#qi{flex:1;border:2px solid #E0E0E0;border-radius:12px;padding:11px 14px;font-size:16px;outline:none;font-family:inherit;transition:border-color .2s}
#qi:focus{border-color:var(--g)}
#pb{background:var(--g);color:white;border:none;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.ocard{background:var(--card);border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
.ohead{background:#F8F8F8;padding:10px 16px;font-size:12px;font-weight:700;color:var(--muted);border-bottom:1px solid #EEE}
.orow{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;font-size:14px;border-bottom:1px solid #F5F5F5}
.orow:last-child{border-bottom:none}
.ototal{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:16px;font-weight:800;border-top:2px solid #EEE}
.ototal span:last-child{color:var(--gd)}
.empty{padding:18px;text-align:center;color:var(--muted);font-size:13px}
.osec{padding:12px 14px;flex:1}
.cta{padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:var(--card);box-shadow:0 -2px 10px rgba(0,0,0,.07)}
#obtn{width:100%;background:var(--g);color:white;border:none;border-radius:16px;padding:16px;font-size:17px;font-weight:800;cursor:pointer;transition:transform .1s}
#obtn:active{transform:scale(.98)}#obtn:disabled{background:#CCC}
/* ── 下單 Sheet ── */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end}
.sheet-overlay.open{display:flex}
.sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;padding:20px 18px;padding-bottom:calc(20px + env(safe-area-inset-bottom));max-height:85dvh;overflow-y:auto}
.sheet-title{font-size:18px;font-weight:800;margin-bottom:4px}
.sheet-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.note-box{background:#F0FCF5;border:1.5px solid var(--g);border-radius:12px;padding:12px 14px;font-size:15px;font-weight:600;line-height:1.7;margin-bottom:14px;word-break:break-all}
.item-btns{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.item-btn{display:flex;align-items:center;justify-content:space-between;background:#F8F8F8;border:none;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;color:var(--text)}
.item-btn:active{background:#EEE}
.item-btn-qty{background:var(--g);color:white;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:800;flex-shrink:0}
.item-btn-arrow{color:var(--muted);font-size:16px;flex-shrink:0}
.sheet-btns{display:flex;flex-direction:column;gap:8px}
.sheet-btn{border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:700;cursor:pointer}
.sheet-btn.primary{background:var(--g);color:white}
.sheet-btn.secondary{background:#F0F0F0;color:var(--text)}
.sheet-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.6}
/* toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:white;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1}
</style>

<body>
<header>
  <div><h1>🍱 今日便當</h1><small>科林研發</small></div>
  <div class="chip">📍 研發二路22號</div>
</header>
<div class="tabs">
  <button class="tab active" id="tab-meat" onclick="switchTab('meat')">🥩 葷食</button>
  <button class="tab" id="tab-veg"  onclick="switchTab('veg')">🌿 素食</button>
</div>
<div class="sec">
  <div class="lbl" id="shop-lbl">今日推薦（Uber Eats 新竹即時）</div>
  <div class="shop-card">
    <div class="shop-icon" id="si">🍱</div>
    <div class="shop-info"><h2 id="sn">載入中…</h2><div class="meta" id="sm"></div></div>
    <button id="rbtn" onclick="next()">換一家</button>
  </div>
</div>
<div class="sec">
  <div class="lbl" style="margin-top:10px">點選加入訂單</div>
  <div class="mgrid" id="mg"></div>
</div>
<div class="sec">
  <div class="lbl" style="margin-top:10px">快速輸入（例：1雞腿 2排骨）</div>
  <div class="qrow2">
    <input id="qi" placeholder="數字＋品名，按 Enter 確認" autocomplete="off">
    <button id="pb" onclick="parse()">確認</button>
  </div>
</div>
<div class="osec">
  <div class="lbl" style="margin-top:4px">訂單明細</div>
  <div class="ocard">
    <div class="ohead">訂購人：戴薇玲 ／ 配送至科林研發</div>
    <div id="or"><div class="empty">尚未選擇餐點</div></div>
    <div class="ototal" id="ot" style="display:none"><span>合計</span><span id="tp">$0</span></div>
  </div>
</div>
<div class="cta">
  <button id="obtn" disabled onclick="placeOrder()">選擇餐點後下單</button>
</div>

<!-- 下單 Sheet -->
<div class="sheet-overlay" id="soverlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-title">📋 訂單已複製！</div>
    <div class="sheet-sub">點下方品項直接跳到 Uber Eats 頁面，逐一加入購物車</div>
    <div class="note-box" id="snote"></div>
    <div class="item-btns" id="sibtns"></div>
    <div class="sheet-btns">
      <button class="sheet-btn primary" id="sopen">🛒 開啟 Uber Eats 店家頁面</button>
      <button class="sheet-btn secondary" onclick="closeSheet()">取消</button>
    </div>
    <div class="sheet-hint">💡 在 Uber Eats「加入備註」欄位貼上訂單文字<br>讓店家確認你的需求</div>
  </div>
</div>

<div class="toast" id="toast"></div>

      {name:"純素主廚便當", price:160, key:"chef",   iid:"a7b464cf-23ee-4e99-8d61-7b64c938d4b9"},
      {name:"蛋奶素主廚便當",price:160, key:"egg",    iid:"903cab68-effd-4c74-ba80-303c6b7b2db7"},
      {name:"純素御膳便當", price:240, key:"premium",iid:"31ae9ee8-40e2-46c0-a3d5-a92e00a0cfb1"},
      {name:"五菜米粉便當", price:170, key:"noodle", iid:"e64c42a5-eb9f-4eee-b648-d1bb0b11637a"},
    ]},
];

const KW_MEAT={
  "雞腿":"chicken","腿":"chicken","雞":"chicken",
  "排骨":"pork","排":"pork","里肌":"pork",
  "控肉":"braised","控":"braised","滷肉":"braised","焢肉":"braised",
  "牛肉":"beef","牛":"beef","燒肉":"pork",
  "蝦":"shrimp","蝦捲":"shrimp","香腸":"sausage",
  "素食":"veg","素":"veg","菜飯":"veg",
};
const KW_VEG={
  "素雞":"chicken","素排":"ribs","素魯":"rice","魯飯":"rice",
  "猴菇":"mushroom","菇":"mushroom","三寶":"combo",
  "主廚":"chef","御膳":"premium","米粉":"noodle","經濟":"box","餐盒":"box",
};

let tab="meat", lists={meat:MEAT, veg:VEG}, idx={meat:0, veg:0};
let items=[], ord={};

window.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("qi").addEventListener("keydown",e=>{if(e.key==="Enter")parse();});
  idx.meat=Math.floor(Math.random()*MEAT.length);
  idx.veg=Math.floor(Math.random()*VEG.length);
  show(lists[tab][idx[tab]]);
});

function switchTab(t){
  tab=t;
  document.getElementById("tab-meat").classList.toggle("active",t==="meat");
  document.getElementById("tab-veg").classList.toggle("active",t==="veg");
  document.getElementById("shop-lbl").textContent=
    t==="veg"?"🌿 素食店家（Uber Eats 新竹即時）":"🥩 葷食店家（Uber Eats 新竹即時）";
  ord={}; show(lists[tab][idx[tab]]);
}

function next(){idx[tab]=(idx[tab]+1)%lists[tab].length; ord={}; show(lists[tab][idx[tab]]);}

function show(s){
  document.getElementById("si").textContent=s.icon;
  document.getElementById("sn").textContent=s.name;
  let html=`<span class="badge g">⭐ ${s.rating}</span>
    <span class="badge o">🕐 ${s.eta}分鐘</span>
    <span class="badge">${s.price}</span>`;
  if(s.veg) html+=`<span class="badge v">🌿 素食</span>`;
  if(s.promo) html+=`<span class="badge p">🏷 ${s.promo}</span>`;
  document.getElementById("sm").innerHTML=html;
  items=s.menu; renderMenu(); renderOrder();
}

function renderMenu(){
  document.getElementById("mg").innerHTML=items.map(it=>`
    <div class="mi" id="mi-${it.key}" onclick="tog('${it.key}')">
      <div class="iname">${it.name}</div>
      <div class="iprice">NT$${it.price}</div>
      <div class="qrow">
        <button class="qbtn" onclick="event.stopPropagation();chg('${it.key}',-1)">−</button>
        <span class="qnum" id="q-${it.key}">0</span>
        <button class="qbtn" onclick="event.stopPropagation();chg('${it.key}',1)">+</button>
      </div>
    </div>`).join("");
}

function tog(k){if(!ord[k])chg(k,1);}
function chg(k,d){
  ord[k]=Math.max(0,(ord[k]||0)+d);
  const e=document.getElementById("q-"+k); if(e)e.textContent=ord[k];
  const c=document.getElementById("mi-"+k); if(c)c.classList.toggle("sel",ord[k]>0);
  renderOrder();
}

function parse(){
  const raw=document.getElementById("qi").value.trim(); if(!raw)return;
  const kw=tab==="veg"?KW_VEG:KW_MEAT;
  const toks=[...raw.matchAll(/(\d+)\s*([^\d\s]+)|([^\d\s]+)\s*(\d+)/g)];
  let found=false;
  for(const m of toks){
    const qty=parseInt(m[1]||m[4]); const word=(m[2]||m[3]||"").trim();
    if(!qty||!word)continue;
    let key=null;
    for(const it of items){if(it.name.includes(word)||word.includes(it.name.replace(/便當|飯|弁当|素/g,""))){key=it.key;break;}}
    if(!key){for(const [k2,v] of Object.entries(kw)){if(word.includes(k2)){key=v;break;}}}
    if(!key){key="c_"+word;if(!items.find(x=>x.key===key)){items.push({name:word,price:100,key,iid:null});renderMenu();}}
    ord[key]=(ord[key]||0)+qty; found=true;
  }
  if(found){
    items.forEach(it=>{
      const e=document.getElementById("q-"+it.key);if(e)e.textContent=ord[it.key]||0;
      const c=document.getElementById("mi-"+it.key);if(c)c.classList.toggle("sel",(ord[it.key]||0)>0);
    });
    renderOrder(); document.getElementById("qi").value=""; toast("✅ 已加入！");
  }else{toast("⚠️ 格式：1雞腿 2排骨");}
}

function renderOrder(){
  const rows=document.getElementById("or"),tot=document.getElementById("ot"),btn=document.getElementById("obtn");
  const its=items.filter(i=>ord[i.key]>0);
  if(!its.length){rows.innerHTML='<div class="empty">尚未選擇餐點 — 點菜單或輸入快速點餐</div>';
    tot.style.display="none";btn.disabled=true;btn.textContent="選擇餐點後下單";return;}
  let total=0;
  rows.innerHTML=its.map(it=>{const s=it.price*ord[it.key];total+=s;
    return `<div class="orow"><span>${it.name} ×${ord[it.key]}</span><span>NT$${s}</span></div>`;
  }).join("");
  document.getElementById("tp").textContent="NT$"+total;
  tot.style.display="flex"; btn.disabled=false;
  const t=its.reduce((s,i)=>s+i.price*ord[i.key],0);
  btn.textContent=`🛒 確認並前往下單 — NT$${t}`;
}

// ── 下單：複製 + 顯示 sheet ──
function placeOrder(){
  const shop=lists[tab][idx[tab]];
  const its=items.filter(i=>ord[i.key]>0);
  if(!its.length)return;

  // 格式化訂單文字
  const orderText=its.map(i=>`${i.name} ×${ord[i.key]}`).join('\n');
  const total=its.reduce((s,i)=>s+i.price*ord[i.key],0);

  // 複製到剪貼簿
  navigator.clipboard.writeText(orderText).catch(()=>{});

  // 填入 sheet
  document.getElementById("snote").innerHTML=
    its.map(i=>`${i.name} <strong>×${ord[i.key]}</strong>`).join('<br>') +
    `<br><span style="color:var(--gd)">合計 NT$${total}</span>`;

  // 品項按鈕（直接跳品項頁面）
  const slug=shop.url.split('/store/')[1].split('?')[0];
  document.getElementById("sibtns").innerHTML=its.map(it=>{
    const url=it.iid
      ? `https://www.ubereats.com/store/${slug}?diningMode=DELIVERY&itemId=${it.iid}`
      : shop.url;
    return `<a class="item-btn" href="${url}" target="_blank">
      <span>${it.name}</span>
      <span style="display:flex;align-items:center;gap:6px">
        <span class="item-btn-qty">×${ord[it.key]}</span>
        <span class="item-btn-arrow">→</span>
      </span>
    </a>`;
  }).join('');

  // 店家頁面按鈕
  document.getElementById("sopen").onclick=()=>{ window.open(shop.url,"_blank"); };

  document.getElementById("soverlay").classList.add("open");
}

function closeSheet(e){
  if(!e||e.target===document.getElementById("soverlay")){
    document.getElementById("soverlay").classList.remove("open");
  }
}

function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}
</script>
</body>
</html>
